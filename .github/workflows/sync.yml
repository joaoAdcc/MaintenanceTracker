name: Sync from jsonblob
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s "https://jsonblob.com/api/jsonBlob/019f5831-5d05-72a5-8f24-19497f57d6b2" > data.json
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"
          git add data.json
          git diff --quiet && exit 0
          git commit -m "Auto-sync from jsonblob"
          git push
