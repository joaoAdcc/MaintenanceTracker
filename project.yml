name: MaintenanceTracker
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5.9"

targets:
  MaintenanceTracker:
    type: application
    platform: iOS
    sources:
      - MaintenanceApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.yourname.maintenancetracker
      INFOPLIST_FILE: MaintenanceApp/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
